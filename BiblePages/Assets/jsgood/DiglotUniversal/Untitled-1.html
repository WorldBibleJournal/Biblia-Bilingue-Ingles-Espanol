<script>
// DATA (example only — expand later)
const bible = {
  old: {
    Genesis: 50,
    Exodus: 40
  },
  new: {
    Matthew: 28,
    Mark: 16,
    Revelation: 22
  }
};

// verses per chapter (simplified sample)
const versesPerChapter = {
  Genesis: {1: 31, 2: 25},
  Matthew: {1: 25, 2: 23},
  Mark: {1: 45},
  Revelation: {1: 20}
};

const newtestament = document.getElementById("chapterResult");
const oldtestament = document.getElementById("oldrowINNER");


const testament = document.getElementById("testament");
const book = document.getElementById("book");
const chapter = document.getElementById("chapter");
const verse = document.getElementById("verse");



// STEP 1: Testament → Books
testament.addEventListener("change", () => {
  book.innerHTML = '<option>Select Book</option>';
  chapter.innerHTML = '<option>Select Chapter</option>';
  verse.innerHTML = '<option>Select Verse</option>';

  const selected = testament.value;
  if (!selected) return;

  Object.keys(bible[selected]).forEach(b => {
    book.innerHTML += `<option value="${b}">${b}</option>`;
  });
});

// STEP 2: Book → Chapters
book.addEventListener("change", () => {
  chapter.innerHTML = '<option>Select Chapter</option>';
  verse.innerHTML = '<option>Select Verse</option>';

  const t = testament.value;
  const b = book.value;
  if (!b) return;

  const totalChapters = bible[t][b];

  for (let i = 1; i <= totalChapters; i++) {
    chapter.innerHTML += `<option value="${i}">${i}</option>`;
  }
});

// STEP 3: Chapter → Verses
chapter.addEventListener("change", () => {
  verse.innerHTML = '<option>Select Verse</option>';

  const b = book.value;
  const c = chapter.value;

  if (!versesPerChapter[b] || !versesPerChapter[b][c]) return;

  const totalVerses = versesPerChapter[b][c];

  for (let i = 1; i <= totalVerses; i++) {
    verse.innerHTML += `<option value="${i}">${i}</option>`;
  }
});
</script>
